{% extends "base.html" %}
{% block title %}Add Prescription — {{ patient.name }}{% endblock %}
{% block content %}
<div class="container" style="max-width:820px">
  <div class="page-header fu">
    <div>
      <div class="page-title">Add Prescription</div>
      <div class="page-sub">For: <strong>{{ patient.name }}</strong></div>
    </div>
    <a href="{{ url_for('patient_detail', pid=patient.id) }}" class="btn btn-outline">← Back</a>
  </div>
  <div class="card fu fu2">
    <form method="POST">
      <input type="hidden" name="_csrf_token" value="{{ csrf_token }}">
      <div class="form-grid">
        <div class="form-group full">
          <label class="form-label">Link to Visit (optional)</label>
          <select class="form-select" name="record_id">
            <option value="">— Not linked to a specific visit —</option>
            {% for r in records %}
            <option value="{{ r.id }}">{{ r.visit_date }} — {{ r.diagnosis or 'General Visit' }}</option>
            {% endfor %}
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Medicine Name <span style="color:var(--danger)">*</span></label>
          <input class="form-input" type="text" name="drug_name" required placeholder="e.g. Paracetamol, Cetirizine">
        </div>
        <div class="form-group">
          <label class="form-label">Dosage</label>
          <input class="form-input" type="text" name="dosage" placeholder="e.g. 500mg, 10mg">
        </div>
        <div class="form-group">
          <label class="form-label">Frequency</label>
          <select class="form-select" name="frequency">
            <option value="">— Select —</option>
            {% for f in ['Once daily','Twice daily','Three times daily','Every 8 hours','Every 12 hours','As needed','Before meals','After meals','At bedtime'] %}
            <option>{{ f }}</option>
            {% endfor %}
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Duration</label>
          <input class="form-input" type="text" name="duration" placeholder="e.g. 5 days, 2 weeks">
        </div>
        <div class="form-group">
          <label class="form-label">Date Prescribed</label>
          <input class="form-input" type="date" name="prescribed_on" id="pd">
        </div>
        <div class="form-group full">
          <label class="form-label">Special Instructions</label>
          <textarea class="form-textarea" name="notes" placeholder="Side effects, warnings, special instructions…" style="min-height:70px"></textarea>
        </div>
      </div>
      <div class="form-actions">
        <button type="submit" class="btn btn-primary">✓ Save Prescription</button>
        <a href="{{ url_for('patient_detail', pid=patient.id) }}" class="btn btn-outline">Cancel</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
{% block scripts %}<script>document.getElementById('pd').valueAsDate=new Date();</script>{% endblock %}
