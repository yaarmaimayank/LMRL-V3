{% extends "base.html" %}
{% block title %}Add Record — {{ patient.name }}{% endblock %}
{% block content %}
<div class="container" style="max-width:820px">
  <div class="page-header fu">
    <div>
      <div class="page-title">Add Medical Record</div>
      <div class="page-sub">For: <strong>{{ patient.name }}</strong></div>
    </div>
    <a href="{{ url_for('patient_detail', pid=patient.id) }}" class="btn btn-outline">← Back</a>
  </div>
  <div class="card fu fu2">
    <form method="POST" enctype="multipart/form-data">
      <input type="hidden" name="_csrf_token" value="{{ csrf_token }}">
      <div class="form-grid">
        <div class="form-group">
          <label class="form-label">Visit Date <span style="color:var(--danger)">*</span></label>
          <input class="form-input" type="date" name="visit_date" required id="vd">
        </div>
        <div class="form-group">
          <label class="form-label">Healthcare Provider / Doctor</label>
          <input class="form-input" type="text" name="provider" placeholder="e.g. Dr. Sharma, AIIMS Patna">
        </div>
        <div class="form-group full">
          <label class="form-label">Diagnosis / Condition</label>
          <input class="form-input" type="text" name="diagnosis" placeholder="e.g. Viral Fever, Skin Allergy, Routine Checkup">
        </div>
        <div class="form-group full">
          <label class="form-label">Notes & Observations</label>
          <textarea class="form-textarea" name="notes" placeholder="Doctor's notes, symptoms, treatment plan…"></textarea>
        </div>
        <div class="form-group full">
          <label class="form-label">Attach Document</label>
          <label class="file-drop" for="fileInput">
            📎 Click to upload (PDF, image, doc — max 16 MB)
            <input type="file" id="fileInput" name="file" accept=".pdf,.png,.jpg,.jpeg,.gif,.doc,.docx">
          </label>
          <div id="fn" class="form-hint"></div>
        </div>
      </div>
      <div class="form-actions">
        <button type="submit" class="btn btn-primary">✓ Save Record</button>
        <a href="{{ url_for('patient_detail', pid=patient.id) }}" class="btn btn-outline">Cancel</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
{% block scripts %}
<script>
document.getElementById('vd').valueAsDate=new Date();
document.getElementById('fileInput').addEventListener('change',function(){
  document.getElementById('fn').textContent=this.files[0]?'Selected: '+this.files[0].name:'';
});
</script>
{% endblock %}
